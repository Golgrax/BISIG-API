name: Generate Sign Language Dataset

on:
  schedule:
    - cron: '0 0 * * *' # Run every Sunday at midnight
  workflow_dispatch: # Allow manual run

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install system dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y libgl1 libglib2.0-0

    - name: Install Python dependencies
      run: |
        pip install -r requirements.txt

    - name: Run precache script
      run: |
        python scripts/precache.py

    - name: Commit and push changes
      uses: stefanzweifel/git-auto-commit-action@v5
      with:
        commit_message: "Auto-generate skeleton dataset and update cache"
        file_pattern: "skeletons/*.json cache.json"
